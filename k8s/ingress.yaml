apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: selfhosted-api
  namespace: apps-prod
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: selfhosted-api.vpjoshi.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: selfhosted-api
                port:
                  number: 80